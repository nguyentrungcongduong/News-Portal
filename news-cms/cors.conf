<IfModule mod_headers.c>
  # Allow any *.vercel.app origin
  <If "req(Origin) =~ /https:\/\/[a-z0-9-]+\.vercel\.app/">
    Header always set Access-Control-Allow-Origin "%{HTTP_ORIGIN}e"
    Header always set Access-Control-Allow-Credentials "true"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, X-XSRF-TOKEN"
    Header always set Vary "Origin"
  </If>

  # Allow any *.onrender.com origin
  <If "req(Origin) =~ /https:\/\/[a-z0-9-]+\.onrender\.com/">
    Header always set Access-Control-Allow-Origin "%{HTTP_ORIGIN}e"
    Header always set Access-Control-Allow-Credentials "true"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, X-XSRF-TOKEN"
    Header always set Vary "Origin"
  </If>

  # Allow localhost for local development
  <If "req(Origin) =~ /http:\/\/localhost(:[0-9]+)?/">
    Header always set Access-Control-Allow-Origin "%{HTTP_ORIGIN}e"
    Header always set Access-Control-Allow-Credentials "true"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, X-XSRF-TOKEN"
    Header always set Vary "Origin"
  </If>
</IfModule>
