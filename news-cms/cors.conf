<IfModule mod_headers.c>
    # Match allowed origins into CORS_ORIGIN env var using backreference $1
    SetEnvIf Origin "^(https://[a-z0-9-]+\.vercel\.app)$"   CORS_ORIGIN=$1
    SetEnvIf Origin "^(https://[a-z0-9-]+\.onrender\.com)$" CORS_ORIGIN=$1
    SetEnvIf Origin "^(http://localhost(:[0-9]+)?)$"         CORS_ORIGIN=$1
    SetEnvIf Origin "^(http://127\.0\.0\.1(:[0-9]+)?)$"     CORS_ORIGIN=$1

    # Only set CORS headers when origin matched (env var is present)
    Header always set Access-Control-Allow-Origin  "%{CORS_ORIGIN}e"                                      env=CORS_ORIGIN
    Header always set Access-Control-Allow-Credentials "true"                                             env=CORS_ORIGIN
    Header always set Access-Control-Allow-Methods  "GET, POST, PUT, PATCH, DELETE, OPTIONS"              env=CORS_ORIGIN
    Header always set Access-Control-Allow-Headers  "Content-Type, Authorization, X-Requested-With, Accept, X-XSRF-TOKEN" env=CORS_ORIGIN
    Header always merge Vary "Origin"
</IfModule>
